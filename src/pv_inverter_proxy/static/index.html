<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV-Inverter-Master</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="sidebar-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sun with glow -->
          <circle cx="16" cy="8" r="4" fill="#F0962E"/>
          <circle cx="16" cy="8" r="6" fill="none" stroke="#F0962E" stroke-width="0.5" opacity="0.4"/>
          <!-- Sun rays -->
          <line x1="16" y1="0.5" x2="16" y2="1.5" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="21.5" y1="2.5" x2="20.8" y2="3.2" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="10.5" y1="2.5" x2="11.2" y2="3.2" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="24" y1="8" x2="23" y2="8" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="8" y1="8" x2="9" y2="8" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="21.5" y1="13.5" x2="20.8" y2="12.8" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="10.5" y1="13.5" x2="11.2" y2="12.8" stroke="#F0962E" stroke-width="1.2" stroke-linecap="round"/>
          <!-- Inverter body -->
          <rect x="4" y="18" width="24" height="11" rx="2.5" fill="rgba(56, 125, 197, 0.15)" stroke="#387DC5" stroke-width="1.5"/>
          <!-- Sine wave inside inverter -->
          <path d="M8 23.5 Q11 20, 14 23.5 Q17 27, 20 23.5 Q23 20, 24 23.5" stroke="#387DC5" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <!-- Connection line sun to inverter -->
          <line x1="16" y1="14.5" x2="16" y2="18" stroke="rgba(240, 150, 46, 0.35)" stroke-width="1" stroke-dasharray="1.5 1.5"/>
        </svg>
        <span class="sidebar-title">PV-Inverter-Master</span>
      </div>

      <!-- Dynamic device list (rendered by JS) -->
      <div id="device-sidebar"></div>

      <!-- Config export/import footer -->
      <div class="ve-sidebar-footer">
        <button class="ve-sidebar-footer-btn" id="btn-config-export" title="Export Config">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M3.5 5.5L7 9l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Export</span>
        </button>
        <button class="ve-sidebar-footer-btn" id="btn-config-import" title="Import Config">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 9V1M3.5 4.5L7 1l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Import</span>
        </button>
        <input type="file" id="config-file-input" accept=".yaml,.yml" style="display:none">
      </div>

      <!-- Phase 44 CHECK-01: Version display -->
      <div id="ve-version-footer" class="ve-version-footer" title="">
        <span class="ve-version-footer-text">v&mdash;</span>
      </div>
    </nav>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="content">
      <!-- Mobile hamburger (hidden on desktop) -->
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="3" y1="5" x2="19" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="17" x2="19" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Device content (JS renders everything here) -->
      <div id="device-content" class="page active"></div>
    </main>
  </div>

  <div id="toast-container" class="ve-toast-container" aria-live="polite"></div>

  <script src="/static/app.js" defer></script>
</body>
</html>
