<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venus OS Fronius Proxy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="sidebar-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="8" width="28" height="18" rx="2" stroke="#387DC5" stroke-width="2" fill="none"/>
          <line x1="6" y1="12" x2="14" y2="22" stroke="#387DC5" stroke-width="1.5"/>
          <line x1="14" y1="12" x2="22" y2="22" stroke="#387DC5" stroke-width="1.5"/>
          <line x1="22" y1="12" x2="26" y2="18" stroke="#387DC5" stroke-width="1.5"/>
          <line x1="6" y1="12" x2="26" y2="12" stroke="#387DC5" stroke-width="1" opacity="0.4"/>
          <line x1="6" y1="17" x2="26" y2="17" stroke="#387DC5" stroke-width="1" opacity="0.4"/>
          <line x1="6" y1="22" x2="26" y2="22" stroke="#387DC5" stroke-width="1" opacity="0.4"/>
          <circle cx="16" cy="4" r="2" fill="#F0962E"/>
          <line x1="16" y1="2" x2="16" y2="0" stroke="#F0962E" stroke-width="1.5"/>
          <line x1="20" y1="3" x2="22" y2="1" stroke="#F0962E" stroke-width="1.5"/>
          <line x1="12" y1="3" x2="10" y2="1" stroke="#F0962E" stroke-width="1.5"/>
        </svg>
        <span class="sidebar-title">Fronius Proxy</span>
      </div>

      <a class="nav-item active" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="12" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 12 L13 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="8" x2="10" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>

      <a class="nav-item" data-page="config">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Config</span>
      </a>

      <a class="nav-item" data-page="registers">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="16" height="2" rx="0.5" fill="currentColor" opacity="0.6"/>
          <rect x="2" y="7" width="16" height="2" rx="0.5" fill="currentColor" opacity="0.6"/>
          <rect x="2" y="11" width="16" height="2" rx="0.5" fill="currentColor" opacity="0.6"/>
          <rect x="2" y="15" width="16" height="2" rx="0.5" fill="currentColor" opacity="0.6"/>
        </svg>
        <span class="nav-label">Registers</span>
      </a>
    </nav>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="3" y1="5" x2="19" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="17" x2="19" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="top-bar-title">Venus OS Fronius Proxy</span>
        <div class="top-bar-status">
          <span class="ve-dot" id="se-dot" title="SolarEdge"></span>
          <span class="ve-dot" id="vos-dot" title="Venus OS"></span>
        </div>
      </header>

      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page active">
        <div class="ve-panel">
          <h2>Dashboard</h2>
          <p class="ve-text-dim">Live data widgets coming in Phase 6. Connection status and health metrics below.</p>
        </div>

        <div class="ve-panel" id="status-panel">
          <h2>Connection Status</h2>
          <div class="ve-status-row">
            <span class="ve-dot" id="se-dot-detail"></span>
            <span id="se-label">SolarEdge: --</span>
          </div>
          <div class="ve-status-row">
            <span class="ve-dot" id="vos-dot-detail"></span>
            <span id="vos-label">Venus OS: --</span>
          </div>
        </div>

        <div class="ve-panel" id="health-panel">
          <h2>Service Health</h2>
          <div class="ve-grid">
            <div><label>Uptime</label><span id="uptime">--</span></div>
            <div><label>Poll Success Rate</label><span id="poll-rate">--</span></div>
            <div><label>Last Poll</label><span id="last-poll">--</span></div>
            <div><label>Cache</label><span id="cache-status">--</span></div>
          </div>
        </div>
      </div>

      <!-- Config Page -->
      <div id="page-config" class="page">
        <div class="ve-panel">
          <h2>Inverter Configuration</h2>
          <form id="config-form">
            <div class="ve-form-group">
              <label for="se-host">SolarEdge IP</label>
              <input type="text" id="se-host" class="ve-input" placeholder="192.168.3.18">
            </div>
            <div class="ve-form-group">
              <label for="se-port">Modbus Port</label>
              <input type="number" id="se-port" class="ve-input" placeholder="1502" min="1" max="65535">
            </div>
            <div class="ve-form-group">
              <label for="se-unit">Unit ID</label>
              <input type="number" id="se-unit" class="ve-input" placeholder="1" min="1" max="247">
            </div>
            <div class="ve-button-group">
              <button type="button" id="btn-test" class="ve-btn">Test Connection</button>
              <button type="submit" id="btn-save" class="ve-btn ve-btn--primary">Save &amp; Apply</button>
            </div>
            <div id="config-message" class="ve-message"></div>
          </form>
        </div>
      </div>

      <!-- Registers Page -->
      <div id="page-registers" class="page">
        <div class="ve-panel">
          <h2>Register Viewer</h2>
          <div id="register-models"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
